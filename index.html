<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wellness Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800;900&family=Barlow+Condensed:wght@600;700;800;900&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0;}
::-webkit-scrollbar{width:2px;height:2px;}::-webkit-scrollbar-thumb{background:#005EFF;}
body,html{font-family:'Barlow',sans-serif;background:#F5F0E8;color:#1A1A2E;}
:root{--bone:#F5F0E8;--bone-dark:#EDE7D9;--bone-mid:#D8D0C0;--ink:#1A1A2E;--ink-soft:#2E2E42;--ink-muted:#6B6B80;--ink-faint:#A8A8B8;--blue:#005EFF;--blue-light:#4080FF;--blue-bg:#EBF0FF;--line:#D0C8B8;--green:#00C853;--green-bg:#E8F5E9;--orange:#FF6D00;--red:#D50000;--today:#FFD600;--purple:#7B1FA2;}
.app{min-height:100vh;background:var(--bone);color:var(--ink);}
.inner{max-width:1060px;margin:0 auto;padding:20px 16px 100px;}
.hkicker{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--ink-muted);}
.htitle{font-family:'Barlow Condensed',sans-serif;font-size:clamp(28px,4vw,48px);font-weight:900;line-height:.95;text-transform:uppercase;letter-spacing:-1px;}
.htitle .acc{color:var(--blue);}
.hrule{border:none;border-top:2.5px solid var(--ink);margin:10px 0 16px;}
.nav-tabs{display:flex;border-bottom:2px solid var(--ink);margin-bottom:20px;overflow-x:auto;gap:0;}
.nav-tab{background:transparent;border:none;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-muted);padding:9px 14px 8px;cursor:pointer;transition:all .15s;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;}
.nav-tab:hover{color:var(--ink);}.nav-tab.active{color:var(--ink);border-bottom-color:var(--blue);}
.hero-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border:1.5px solid var(--ink);border-radius:2px;margin-bottom:14px;overflow:hidden;}
@media(max-width:600px){.hero-grid{grid-template-columns:1fr 1fr;}}
.hero-card{padding:14px 16px;border-right:1.5px solid var(--ink);}
.hero-card:last-child{border-right:none;}
.hero-card .ring-wrap{display:flex;align-items:center;gap:10px;}
.ring-pct{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;line-height:1;}
.ring-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink-muted);margin-top:2px;}
.ring-sub{font-size:11px;color:var(--ink-muted);margin-top:1px;}
.hero-consejo{grid-column:1/-1;border-top:1.5px solid var(--ink);padding:12px 16px;display:flex;align-items:flex-start;gap:10px;background:var(--bone-dark);}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);border:1.5px solid var(--ink);border-radius:2px;margin-bottom:14px;}
.stat-item{padding:10px 12px;border-right:1.5px solid var(--ink);position:relative;overflow:hidden;}
.stat-item:last-child{border-right:none;}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;line-height:1;}
.stat-num.blue{color:var(--blue);}.stat-num.green{color:var(--green);}.stat-num.orange{color:var(--orange);}
.stat-label{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink-muted);margin-top:2px;}
.stat-fill{position:absolute;bottom:0;left:0;height:3px;background:var(--blue);transition:width .6s;}
@media(max-width:600px){.stats-bar{grid-template-columns:repeat(2,1fr);}.stat-item:nth-child(2){border-right:none;}.stat-item:nth-child(3),.stat-item:nth-child(4){border-top:1.5px solid var(--ink);}}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.cal-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;text-transform:uppercase;letter-spacing:-.5px;}
.cal-nav{background:var(--bone-dark);border:1.5px solid var(--ink);padding:6px 12px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:var(--ink);}
.cal-nav:hover{background:var(--ink);color:var(--bone);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0;border:1.5px solid var(--ink);border-radius:2px;overflow:hidden;}
.cal-dow{background:var(--ink);padding:6px 4px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--bone);text-align:center;}
.cal-cell{min-height:110px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:5px;cursor:pointer;transition:background .12s;position:relative;background:var(--bone);display:flex;flex-direction:column;gap:2px;}
.cal-cell:nth-child(7n){border-right:none;}.cal-cell:hover{background:var(--bone-dark);}
.cal-cell.empty{background:var(--bone-dark);cursor:default;}
.cal-cell.today{background:#FFFDE7;border-top:3px solid var(--today);}
.cal-cell.drag-over{background:var(--blue-bg)!important;outline:2px dashed var(--blue);outline-offset:-2px;}
.day-num{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;color:var(--ink);line-height:1;}
.today-badge{display:inline-block;background:var(--today);color:var(--ink);font-size:7px;font-weight:900;letter-spacing:1px;padding:1px 3px;border-radius:1px;margin-left:3px;text-transform:uppercase;vertical-align:middle;}
.chip{display:flex;align-items:center;gap:3px;border-radius:2px;padding:2px 4px;font-size:9px;font-weight:600;line-height:1.3;cursor:grab;background:var(--blue-bg);border:1px solid transparent;user-select:none;position:relative;}
.chip:hover{border-color:var(--blue-light);}
.chip.recipe{background:#F3E5F5;}
.chip.empty{background:transparent;border:1px dashed var(--line);color:var(--ink-faint);cursor:pointer;}
.chip.empty:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg);}
.chip-del{position:absolute;top:-4px;right:-4px;background:var(--red);color:white;border:none;border-radius:50%;width:12px;height:12px;font-size:8px;cursor:pointer;display:none;align-items:center;justify-content:center;}
.chip:hover .chip-del{display:flex;}
.cell-workout{display:flex;align-items:center;gap:3px;border-radius:2px;padding:2px 5px;font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:white;cursor:pointer;margin-top:auto;}
.cell-workout.empty-w{background:transparent;border:1px dashed var(--line);color:var(--ink-faint);}
.cell-workout.empty-w:hover{border-color:var(--green);color:var(--green);}
.week-grid{display:grid;grid-template-columns:56px repeat(7,1fr);border:1.5px solid var(--ink);border-radius:2px;}
.wg-label{background:var(--bone-dark);border-right:1.5px solid var(--ink);border-bottom:1px solid var(--line);padding:6px 4px;font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--ink-muted);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:1px;}
.wg-day-head{background:var(--ink);padding:8px 4px;text-align:center;border-right:1px solid var(--ink-soft);cursor:pointer;}
.wg-day-head.today-head{background:var(--orange);}.wg-day-head:hover{background:var(--blue);}
.wg-head-dow{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--bone);}
.wg-head-num{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:900;color:var(--bone);line-height:1;}
.wg-cell{border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:4px;min-height:54px;cursor:pointer;transition:background .12s;position:relative;}
.wg-cell:hover{background:var(--bone-dark);}.wg-cell.today-col{background:#FFFDE7;}
.wg-cell.drag-over{background:var(--blue-bg)!important;outline:2px dashed var(--blue);outline-offset:-2px;}
.wg-chip{border-radius:2px;padding:3px 5px;font-size:10px;font-weight:500;line-height:1.35;cursor:grab;background:var(--blue-bg);border:1px solid transparent;position:relative;user-select:none;}
.wg-chip:hover{border-color:var(--blue-light);}.wg-chip.recipe{background:#F3E5F5;}
.wg-chip.empty{background:transparent;border:1px dashed var(--line);color:var(--ink-faint);font-size:9px;cursor:pointer;}
.wg-chip.empty:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-bg);}
.wg-chip-del{position:absolute;top:-4px;right:-4px;background:var(--red);color:white;border:none;border-radius:50%;width:13px;height:13px;font-size:8px;cursor:pointer;display:none;align-items:center;justify-content:center;}
.wg-chip:hover .wg-chip-del{display:flex;}
.detail-panel{border:1.5px solid var(--ink);border-radius:2px;overflow:hidden;margin-top:18px;}
.detail-header{background:var(--ink);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.detail-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;text-transform:uppercase;color:var(--bone);letter-spacing:-.5px;}
.detail-body{padding:16px;}
.meal-row{display:flex;align-items:stretch;border-bottom:1.5px solid var(--line);cursor:pointer;transition:background .12s;position:relative;}
.meal-row:last-child{border-bottom:none;}.meal-row:hover{background:var(--bone-dark);}.meal-row.filled{background:var(--blue-bg);}
.meal-row.recipe-row{background:#F3E5F5;}.meal-row.recipe-row:hover{background:#E1BEE7;}
.meal-icon-col{width:40px;display:flex;align-items:center;justify-content:center;font-size:14px;border-right:1.5px solid var(--line);flex-shrink:0;background:var(--bone-dark);}
.meal-body{flex:1;padding:7px 9px;}
.meal-name{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--ink-muted);}
.meal-value{font-size:12px;font-weight:500;color:var(--ink);margin-top:2px;line-height:1.4;}
.cal-badge{display:inline-flex;align-items:center;gap:3px;background:var(--green);color:white;padding:2px 6px;border-radius:2px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;margin-top:3px;}
.macro-pills{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap;}
.macro-pill{font-size:8px;font-weight:700;padding:2px 5px;border-radius:2px;border:1.5px solid;}
.macro-pill.p{color:#1565C0;border-color:#1565C0;background:#E3F2FD;}
.macro-pill.c{color:#E65100;border-color:#E65100;background:#FFF3E0;}
.macro-pill.g{color:#558B2F;border-color:#558B2F;background:#F1F8E9;}
.btn-main{background:var(--ink);color:var(--bone);border:none;padding:10px 20px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .15s;border-radius:2px;}
.btn-main:hover{background:var(--blue);}.btn-main:disabled{opacity:.4;cursor:default;}
.btn-main.blue{background:var(--blue);}.btn-main.blue:hover{background:var(--blue-light);}
.btn-main.orange{background:var(--orange);}.btn-main.green{background:var(--green);}
.btn-main.purple{background:var(--purple);}.btn-main.red{background:var(--red);}
.btn-sec{background:transparent;color:var(--ink-muted);border:1.5px solid var(--line);padding:8px 13px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;border-radius:2px;}
.btn-sec:hover{border-color:var(--ink);color:var(--ink);}
.modal-bg{position:fixed;inset:0;background:rgba(26,26,46,.78);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);}
.modal-box{background:var(--bone);border:2px solid var(--ink);padding:22px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;border-radius:2px;}
.modal-box.wide{max-width:780px;}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:-.5px;}
.modal-sub{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-muted);margin-top:2px;margin-bottom:14px;}
input[type=text],input[type=number],input[type=date],textarea,.form-input{background:var(--bone-dark);border:1.5px solid var(--ink);color:var(--ink);border-radius:2px;padding:9px 11px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:500;width:100%;outline:none;transition:border-color .15s;}
input:focus,textarea:focus,.form-input:focus{border-color:var(--blue);background:var(--bone);}
input::placeholder,textarea::placeholder{color:var(--ink-faint);}
textarea{resize:none;}
select.form-input{cursor:pointer;}
.form-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--ink-muted);margin-bottom:5px;display:block;}
.sec-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--ink-muted);margin-bottom:6px;}
.info-tip{background:var(--blue-bg);border-left:3px solid var(--blue);padding:8px 12px;margin-top:10px;border-radius:1px;}
.info-tip p{font-size:11px;color:var(--ink-soft);line-height:1.6;}
.error-box{background:#FFEBEE;border:1.5px solid var(--red);padding:10px 14px;border-radius:2px;margin-bottom:12px;}
.error-box p{font-size:12px;color:var(--red);font-weight:500;}
.workout-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1.5px solid var(--ink);border-radius:2px;overflow:hidden;}
.w-chip{background:var(--bone);border:none;border-right:1.5px solid var(--ink);border-bottom:1.5px solid var(--ink);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--ink-muted);padding:10px 6px;cursor:pointer;transition:all .15s;text-align:center;}
.w-chip:nth-child(3n){border-right:none;}.w-chip:nth-child(n+4){border-bottom:none;}
.w-chip:hover{background:var(--bone-dark);}.w-chip.sel{background:var(--ink);color:var(--bone);}
.check-big{width:46px;height:46px;border-radius:2px;border:2.5px solid var(--ink);background:transparent;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;font-family:'Barlow Condensed',sans-serif;font-weight:900;color:var(--ink-muted);}
.check-big.done{background:var(--blue);border-color:var(--blue);color:white;}
.plan-day-card{border:1.5px solid var(--line);padding:12px;margin-bottom:-1px;background:var(--bone);}
.plan-day-card.today-plan{border-color:var(--blue);background:var(--blue-bg);}
.cell-popover{position:absolute;z-index:200;background:var(--bone);border:2px solid var(--ink);border-radius:3px;padding:10px;width:210px;box-shadow:0 8px 24px rgba(0,0,0,.2);top:100%;left:0;margin-top:4px;}
.ingr-tag{display:inline-flex;align-items:center;gap:5px;background:var(--bone-dark);border:1.5px solid var(--ink);padding:4px 10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-radius:2px;cursor:pointer;transition:all .15s;}
.ingr-tag:hover{background:var(--ink);color:var(--bone);}
.ingr-tag.sel{background:var(--blue);color:white;border-color:var(--blue);}
.rec-step{border:1.5px solid var(--ink);padding:16px;background:var(--bone);}
.rec-step-num{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--blue);margin-bottom:4px;}
.rec-step-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;text-transform:uppercase;letter-spacing:-.5px;margin-bottom:12px;}
.day-rec-card{border:1.5px solid var(--line);margin-bottom:-1px;background:var(--bone);overflow:hidden;}
.day-rec-header{background:var(--ink-soft);color:var(--bone);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.meal-rec-row{display:flex;gap:0;border-bottom:1px solid var(--line);}
.meal-rec-row:last-child{border-bottom:none;}
.meal-rec-icon{width:36px;background:var(--bone-dark);display:flex;align-items:center;justify-content:center;font-size:13px;border-right:1px solid var(--line);flex-shrink:0;}
.meal-rec-body{flex:1;padding:8px 10px;}
.meal-rec-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900;color:var(--ink);}
.meal-rec-prep{font-size:10px;color:var(--ink-soft);margin-top:4px;line-height:1.5;}
.speed-btn{background:var(--bone);border:1.5px solid var(--line);padding:8px 10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-muted);cursor:pointer;border-radius:2px;transition:all .12s;text-align:center;}
.speed-btn:hover{border-color:var(--ink);color:var(--ink);}
.speed-btn.sel{background:var(--ink);color:var(--bone);border-color:var(--ink);}
.recipe-modal-meal{border:1.5px solid var(--line);border-radius:2px;overflow:hidden;margin-bottom:10px;}
.recipe-modal-meal-head{background:var(--ink);color:var(--bone);padding:8px 14px;display:flex;align-items:center;gap:8px;}
.recipe-modal-meal-body{padding:12px 14px;background:var(--bone);}
.peso-entry{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--line);background:var(--bone);}
.peso-entry:last-child{border-bottom:none;}
.peso-entry:nth-child(even){background:var(--bone-dark);}
.peso-badge{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;}
.peso-diff-up{color:var(--orange);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;}
.peso-diff-down{color:var(--green);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;}
.peso-cell-badge{display:inline-flex;align-items:center;gap:2px;background:var(--bone-dark);border:1px solid var(--line);border-radius:2px;padding:1px 5px;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;color:var(--ink-muted);cursor:pointer;margin-top:2px;}
.peso-cell-badge:hover{border-color:var(--ink);color:var(--ink);}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .2s ease forwards;}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner{display:inline-block;border:2px solid var(--bone-mid);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.pulsing{animation:pulse 1.5s infinite;}
/* API key banner */
.apikey-banner{background:#FFFDE7;border:2px solid var(--today);padding:14px 18px;border-radius:2px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.apikey-banner p{font-size:12px;color:var(--ink-soft);flex:1;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useRef,useEffect}=React;

// ── CONFIG ──────────────────────────────────────────────────────────────
const MODEL="claude-sonnet-4-20250514";
const MEALS=["desayuno","almuerzo","cena","snack"];
const MEAL_ICONS={desayuno:"☀️",almuerzo:"🌤",cena:"🌙",snack:"◦"};
const MEAL_LABELS={desayuno:"DESAYUNO",almuerzo:"ALMUERZO",cena:"CENA",snack:"SNACK"};
const WORKOUT_TYPES=["Pesas","Cardio","HIIT","Funcional","Yoga","Descanso"];
const WORKOUT_COLORS={Pesas:"#005EFF",Cardio:"#00C853",HIIT:"#D50000",Funcional:"#FF6D00",Yoga:"#7B1FA2",Descanso:"#78909C"};
const TODAY=new Date();TODAY.setHours(0,0,0,0);
const ACTIVITY_MULT={sedentario:1.2,poco:1.375,moderado:1.55,muy:1.725};
const MONTH_NAMES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DOW_SHORT=["LUN","MAR","MIÉ","JUE","VIE","SÁB","DOM"];
const INGR_SUGERIDOS=["Pollo","Atún","Huevos","Avena","Arroz","Frijoles","Brócoli","Espinaca","Aguacate","Tomate","Tortillas","Pan integral","Yogur griego","Leche","Plátano","Manzana","Queso cottage","Lentejas","Aceite de oliva","Cebolla","Chile","Ajo"];
const SPEED_OPTIONS=[
  {id:"muy_lento",label:"Muy lento",desc:"±100 kcal/día",ajuste:{bajar:-100,mantener:0,musculo:100,rendimiento:100}},

// ── HELPERS ──────────────────────────────────────────────────────────────
function toKey(d){const dd=new Date(d);return `${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,"0")}-${String(dd.getDate()).padStart(2,"0")}`;}
function fromKey(k){const[y,m,d]=k.split("-");return new Date(+y,+m-1,+d);}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function sameDay(a,b){return toKey(a)===toKey(b);}
function getMonthDays(year,month){const first=new Date(year,month,1).getDay(),days=[];const offset=(first+6)%7;for(let i=0;i<offset;i++)days.push(null);const total=new Date(year,month+1,0).getDate();for(let i=1;i<=total;i++)days.push(new Date(year,month,i));return days;}
function getWeekDays(ref){const d=new Date(ref),dow=(d.getDay()+6)%7,mon=addDays(d,-dow);return Array.from({length:7},(_,i)=>addDays(mon,i));}
function emptyDay(){return{meals:{desayuno:"",almuerzo:"",cena:"",snack:""},calorias:{desayuno:null,almuerzo:null,cena:null,snack:null},calLoading:{desayuno:false,almuerzo:false,cena:false,snack:false},workout:{done:false,type:"",notes:""},water:0,mood:0,planned:false,peso:null};}
function calcMetas(p){const{peso,estatura,edad,sexo,actividad,objetivo,velocidad,metaCalManual}=p;if(!peso||!estatura||!edad)return null;const bmr=sexo==="m"?10*peso+6.25*estatura-5*edad+5:10*peso+6.25*estatura-5*edad-161;const tdee=bmr*(ACTIVITY_MULT[actividad]||1.55);const spd=SPEED_OPTIONS.find(s=>s.id===velocidad)||SPEED_OPTIONS[2];const ajuste=spd.ajuste[objetivo]||0;const calAuto=Math.round(tdee+ajuste);const cals=metaCalManual?+metaCalManual:calAuto;const rango=Math.abs(ajuste/4)||75;const calMin=Math.max(sexo==="m"?1200:1000,Math.round(cals-rango));const calMax=Math.round(cals+rango);const mac=OBJETIVO_MACROS[objetivo]||OBJETIVO_MACROS.mantener;return{calorias:cals,calAuto,calMin,calMax,rango,proteinas:Math.round((cals*mac.p)/4),carbos:Math.round((cals*mac.c)/4),grasas:Math.round((cals*mac.g)/9),tdee:Math.round(tdee)};}

// ── API CALL ──────────────────────────────────────────────────────────────
async function callClaude(system,userContent,maxTokens=1000,apiKey){
  const res=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:MODEL,max_tokens:maxTokens,system,messages:[{role:"user",content:userContent}]})
  });
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  return data.content?.map(i=>i.text||"").join("")||"";
}

// ── WEIGHT CHART ──────────────────────────────────────────────────────────
function WeightChart({weightLog,pesoMeta}){
  if(!weightLog||weightLog.length<2)return null;
  const sorted=[...weightLog].sort((a,b)=>a.date.localeCompare(b.date));
  const W=560,H=200,PL=52,PR=20,PT=16,PB=36;
  const iW=W-PL-PR,iH=H-PT-PB;
  const vals=sorted.map(e=>e.peso);
  const allVals=pesoMeta?[...vals,+pesoMeta]:vals;
  const minV=Math.min(...allVals)-1,maxV=Math.max(...allVals)+1,range=maxV-minV||1;
  const xOf=i=>PL+(sorted.length===1?iW/2:(i/(sorted.length-1))*iW);
  const yOf=v=>PT+iH-((v-minV)/range)*iH;
  const yTicks=4,yStep=range/yTicks;
  const gridLines=Array.from({length:yTicks+1},(_,i)=>minV+i*yStep);
  const pts=sorted.map((e,i)=>`${xOf(i)},${yOf(e.peso)}`);
  const linePath=`M ${pts.join(" L ")}`;
  const areaPath=`M ${xOf(0)},${PT+iH} L ${pts.join(" L ")} L ${xOf(sorted.length-1)},${PT+iH} Z`;
  const first=vals[0],last=vals[vals.length-1],isDown=last<=first;
  const lineColor=isDown?"#00C853":"#FF6D00";
  const pesoMetaY=pesoMeta?yOf(+pesoMeta):null;
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto",display:"block"}}>
      <defs>
        <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={lineColor} stopOpacity=".18"/>
          <stop offset="100%" stopColor={lineColor} stopOpacity=".01"/>
        </linearGradient>
        <clipPath id="cc"><rect x={PL} y={PT} width={iW} height={iH}/></clipPath>
      </defs>
      {gridLines.map((v,i)=>(
        <g key={i}>
          <line x1={PL} x2={PL+iW} y1={yOf(v)} y2={yOf(v)} stroke="#D0C8B8" strokeWidth="1" strokeDasharray="3,3"/>
          <text x={PL-6} y={yOf(v)+4} textAnchor="end" fontSize="9" fill="#A8A8B8" fontFamily="'Barlow Condensed',sans-serif" fontWeight="700">{v.toFixed(1)}</text>
        </g>
      ))}
      {pesoMetaY&&<><line x1={PL} x2={PL+iW} y1={pesoMetaY} y2={pesoMetaY} stroke="#005EFF" strokeWidth="1.5" strokeDasharray="6,4"/><text x={PL+iW-2} y={pesoMetaY-4} textAnchor="end" fontSize="9" fill="#005EFF" fontFamily="'Barlow Condensed',sans-serif" fontWeight="800">META {pesoMeta}kg</text></>}
      <path d={areaPath} fill="url(#wg)" clipPath="url(#cc)"/>
      <path d={linePath} fill="none" stroke={lineColor} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" clipPath="url(#cc)"/>
      {sorted.map((e,i)=>{
        const x=xOf(i),y=yOf(e.peso),isF=i===0,isL=i===sorted.length-1;
        const show=isF||isL||sorted.length<=8;
        const dateObj=fromKey(e.date);
        return(
          <g key={e.date}>
            <circle cx={x} cy={y} r={isF||isL?5:3.5} fill={isF||isL?lineColor:"white"} stroke={lineColor} strokeWidth="2"/>
            {show&&<text x={x} y={PT+iH+14} textAnchor="middle" fontSize="8" fill="#6B6B80" fontFamily="'Barlow Condensed',sans-serif" fontWeight="700">{dateObj.getDate()}/{dateObj.getMonth()+1}</text>}
            {(isF||isL)&&<text x={x} y={y-9} textAnchor="middle" fontSize="10" fill={lineColor} fontFamily="'Barlow Condensed',sans-serif" fontWeight="900">{e.peso}kg</text>}
          </g>
        );
      })}
    </svg>
  );
}

function Ring({pct,color,size=52,stroke=6}){
  const r=(size-stroke)/2,circ=2*Math.PI*r,off=circ-(Math.min(pct,100)/100)*circ;
  return(<svg width={size} height={size}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--bone-mid)" strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`} style={{transition:"stroke-dashoffset .6s"}}/></svg>);
}

    [["desayuno","☀️"],["almuerzo","🌤"],["cena","🌙"],["snack","◦"]].forEach(([meal,icon])=>{

    });

  const blob=new Blob([html],{type:"text/html"});

            {calView==="mes"&&(
              <>

                <div className="cal-grid">

                  {monthDays.map((d,idx)=>{
                    if(!d)return<div key={`e${idx}`} className="cal-cell empty"/>;
                    const k=toKey(d),dd=data[k]||emptyDay(),isToday=sameDay(d,TODAY);
                    const tc=MEALS.reduce((s,m)=>s+(dd.calorias[m]?.calorias||0),0);

                      <div key={k} className={`cal-cell ${isToday?"today":""} ${dov?"drag-over":""}`}

                            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:900,color:metas&&tc>metas.calorias*1.1?"var(--orange)":metas&&tc>=metas.calorias*.85?"var(--green)":"var(--blue)"}}>{tc}<span style={{fontSize:8,fontWeight:500,color:"var(--ink-faint)"}}> kcal</span></span>

                  <div className="detail-title">
                    {selectedDate.toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"long"})}

                  </div>
                  <button onClick={()=>setSelectedDate(d=>addDays(d,1))} style={{background:"transparent",border:"1.5px solid rgba(255,255,255,.25)",color:"var(--bone)",padding:"4px 10px",fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:900,cursor:"pointer",borderRadius:2}}>›</button>
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                  {hasRecipes(selectedDate)&&<button className="btn-main purple" style={{padding:"7px 14px",fontSize:10}} onClick={()=>setRecipeModal({date:new Date(selectedDate)})}>🍽 Recetas</button>}
                  {metas&&selTotalCals>0&&<div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:900,color:selTotalCals>metas.calorias*1.1?"var(--orange)":selTotalCals>=metas.calorias*.85?"var(--green)":"var(--blue)"}}>{selTotalCals}<span style={{fontSize:12,color:"var(--bone)",opacity:.6,fontWeight:400}}> / {metas.calorias} kcal</span></div>}

                  <div>
                    <p className="sec-label">Comidas</p>
                    <div style={{border:"1.5px solid var(--ink)",borderRadius:2,overflow:"hidden"}}>
                      {MEALS.map(meal=>{const val=selDay.meals[meal],cal=selDay.calorias[meal],loading=selDay.calLoading[meal],hasRec=selDay.recetas?.[meal],has=val?.trim();return(
                        <div key={meal} className={`meal-row ${hasRec?"recipe-row":has?"filled":""}`} onClick={()=>openMeal(meal,selectedDate)}>

                          <div className="meal-body">
                            <div className="meal-name">{MEAL_LABELS[meal]}</div>

                              {hasRec?<div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:900}}>{hasRec.nombre}</div>:<div className="meal-value">{val}</div>}
                              {selDay.imagenes?.[meal]&&<img src={selDay.imagenes[meal]} alt="foto" style={{width:54,height:54,objectFit:"cover",borderRadius:2,marginTop:5,border:"1.5px solid var(--line)",cursor:"pointer"}} onClick={e=>{e.stopPropagation();window.open(selDay.imagenes[meal],"_blank");}}/>}
                              {loading&&<div style={{display:"flex",alignItems:"center",gap:5,marginTop:3}}><div className="spinner" style={{width:8,height:8}}/><span style={{fontSize:9,color:"var(--ink-muted)"}}>Calculando…</span></div>}
                              {!loading&&cal?.calorias&&(<><div className="cal-badge">🔥 {cal.calorias}</div><div className="macro-pills">{cal.proteinas&&<span className="macro-pill p">P:{cal.proteinas}g</span>}{cal.carbos&&<span className="macro-pill c">C:{cal.carbos}g</span>}{cal.grasas&&<span className="macro-pill g">G:{cal.grasas}g</span>}</div></>)}
                            </>):<div style={{fontSize:11,color:"var(--bone-mid)",marginTop:2}}>Toca para registrar</div>}
                          </div>
                        </div>
                      );})}
                    </div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    <div>
                      <p className="sec-label">Peso del día</p>
                      <div style={{border:"1.5px solid var(--ink)",borderRadius:2,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontSize:24}}>⚖️</span>

                          {getWeightForDate(toKey(selectedDate))?<div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:900,color:"var(--blue)"}}>{getWeightForDate(toKey(selectedDate))} <span style={{fontSize:14,color:"var(--ink-muted)",fontWeight:400}}>kg</span></div>

                          <input type="number" step="0.1" min={20} max={300} placeholder="75.0" style={{width:72,padding:"7px 8px",fontSize:13,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,textAlign:"center"}}
                            onKeyDown={e=>{if(e.key==="Enter"){addWeightEntry(toKey(selectedDate),e.target.value);e.target.value="";}}} id="detail-peso-input"/>

                        </button>

        {/* ══ PESO ══ */}

                <div key={i} style={{padding:"12px 14px",borderRight:i<3?"1.5px solid var(--ink)":"none",textAlign:"center"}}>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:900,color:c.color}}>{c.val}</div>
                  <div style={{fontSize:9,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",color:"var(--ink-muted)",marginTop:3}}>{c.label}</div>
                </div>
              ))}
            </div>
            {pesoInicial&&perfil.pesoMeta&&pesoActual&&(
              <div style={{border:"1.5px solid var(--blue)",background:"var(--blue-bg)",padding:"12px 16px",borderRadius:2,marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,fontWeight:800,letterSpacing:"2px",textTransform:"uppercase",color:"var(--blue)"}}>Progreso hacia la meta</span>
                  <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:900,color:"var(--blue)"}}>{pesoProgPct}%</span>
                </div>
                <div style={{height:8,background:"var(--bone-mid)",borderRadius:4,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${pesoProgPct}%`,background:pesoProgPct>=100?"var(--green)":"var(--blue)",transition:"width .8s",borderRadius:4}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:11,color:"var(--ink-muted)"}}>
                  <span>Inicio: {pesoInicial}kg</span>
                  {pesoProgPct<100&&<span>Faltan {Math.abs(+(pesoActual-+perfil.pesoMeta).toFixed(1))}kg</span>}
                  <span>Meta: {perfil.pesoMeta}kg</span>
                </div>
              </div>
            )}
            <div style={{border:"1.5px solid var(--ink)",borderRadius:2,overflow:"hidden",marginBottom:16}}>
              <div style={{background:"var(--ink)",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:900,textTransform:"uppercase",letterSpacing:"1px",color:"var(--bone)"}}>📈 Gráfica de progreso</span>
                <span style={{fontSize:10,color:"rgba(255,255,255,.5)"}}>{sortedWeight.length} registros</span>
              </div>
              <div style={{padding:"16px",background:"var(--bone)"}}>
                {sortedWeight.length>=2?<WeightChart weightLog={weightLog} pesoMeta={perfil.pesoMeta}/>
                :<div style={{textAlign:"center",padding:"40px 20px",color:"var(--ink-muted)"}}><div style={{fontSize:36,marginBottom:8}}>📉</div><p style={{fontSize:14}}>Necesitas al menos 2 registros para ver la gráfica.</p></div>}
              </div>
            </div>
            <div style={{border:"1.5px solid var(--ink)",borderRadius:2,overflow:"hidden",marginBottom:16}}>
              <div style={{background:"var(--bone-dark)",padding:"10px 16px",borderBottom:"1.5px solid var(--ink)"}}><span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:900,textTransform:"uppercase",letterSpacing:"1px"}}>+ Registrar pesaje</span></div>
              <div style={{padding:"14px 16px",display:"flex",gap:12,alignItems:"flex-end",flexWrap:"wrap"}}>
                <div style={{flex:"0 0 160px"}}><label className="form-label">Fecha</label><input type="date" value={newPesoDate} onChange={e=>setNewPesoDate(e.target.value)}/></div>
                <div style={{flex:"0 0 120px"}}><label className="form-label">Peso (kg)</label><input type="number" step=".1" min={20} max={300} placeholder="75.0" value={newPesoVal} onChange={e=>setNewPesoVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&newPesoVal){addWeightEntry(newPesoDate,newPesoVal);setNewPesoVal("");}}} /></div>
                <button className="btn-main green" style={{padding:"9px 18px"}} disabled={!newPesoVal} onClick={()=>{addWeightEntry(newPesoDate,newPesoVal);setNewPesoVal("");}}>✓ Guardar</button>
              </div>
            </div>
            {sortedWeight.length>0&&(
              <div style={{border:"1.5px solid var(--ink)",borderRadius:2,overflow:"hidden"}}>
                <div style={{background:"var(--ink)",padding:"10px 16px"}}><span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:900,textTransform:"uppercase",letterSpacing:"1px",color:"var(--bone)"}}>Historial</span></div>
                <div>{[...sortedWeight].reverse().map((entry,i,arr)=>{const prev=arr[i+1];const diff=prev?+(entry.peso-prev.peso).toFixed(1):null;const date=fromKey(entry.date);const isT=sameDay(date,TODAY);return(
                  <div key={entry.date} className="peso-entry">
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <div>
                        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,fontWeight:800,letterSpacing:"1.5px",textTransform:"uppercase",color:"var(--ink-muted)"}}>{date.toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}{isT&&<span style={{background:"var(--today)",color:"var(--ink)",padding:"1px 5px",marginLeft:6,fontSize:8,fontWeight:900,borderRadius:1}}>HOY</span>}</div>

                      </div>
                      {diff!==null&&<div className={diff<=0?"peso-diff-down":"peso-diff-up"}>{diff<=0?`▼ ${Math.abs(diff)}kg`:`▲ +${diff}kg`}</div>}
                    </div>
                    <button onClick={()=>removeWeightEntry(entry.date)} style={{background:"transparent",border:"1.5px solid var(--line)",color:"var(--ink-faint)",width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",borderRadius:2,fontSize:12,fontWeight:900}}>×</button>
                  </div>
                );})}
                </div>
              </div>
            )}
          </div>
        )}

        {/* ══ RECETARIO ══ */}

            {(()=>{

                {label:"Días con comidas",val:days30.filter(d=>MEALS.some(m=>data[toKey(d)]?.meals[m])).length,color:"var(--blue)"},

                      <div key={l}><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:900}}>{v}</div><div style={{fontSize:9,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",color:"var(--blue)"}}>{l}</div></div>
                    ))}

                </div>

                <div style={{display:"flex",gap:8}}>
                  <button className="btn-main" onClick={()=>{setPerfil({...tmpPerfil});setEditPerfil(false);setConsejo("");}}>Guardar</button>
                  <button className="btn-sec" onClick={()=>setEditPerfil(false)}>Cancelar</button>
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      <RecipeModal/>

      {/* MEAL MODAL */}
      {modal&&(
        <div className="modal-bg" onClick={()=>setModal(null)}>
          <div className="modal-box" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">{MEAL_ICONS[modal.meal]} {MEAL_LABELS[modal.meal]}</div>
            <div className="modal-sub">{modal.date.toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"long"})}</div>
            {getDay(modal.date).recetas?.[modal.meal]&&<div style={{background:"#F3E5F5",border:"1.5px solid var(--purple)",padding:"10px 14px",borderRadius:2,marginBottom:12}}><p style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,fontWeight:800,letterSpacing:"2px",textTransform:"uppercase",color:"var(--purple)",marginBottom:4}}>Receta IA activa</p><p style={{fontSize:13,fontWeight:700}}>{getDay(modal.date).recetas[modal.meal].nombre}</p></div>}
            <textarea rows={3} placeholder='Ej: "2 huevos revueltos, tostada, café"' value={tempText} onChange={e=>setTempText(e.target.value)} autoFocus/>
            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:12}}>
              <button onClick={()=>setManualEdit(m=>!m)} style={{background:manualEdit?"var(--ink)":"transparent",color:manualEdit?"var(--bone)":"var(--ink-muted)",border:"1.5px solid var(--line)",padding:"5px 10px",fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,fontWeight:800,letterSpacing:"1.5px",textTransform:"uppercase",cursor:"pointer",borderRadius:2}}>✎ {manualEdit?"Editando macros":"Editar macros manual"}</button>
            </div>
            {manualEdit&&(
              <div style={{border:"1.5px solid var(--ink)",padding:"12px",borderRadius:2,marginTop:10,background:"var(--bone-dark)"}}>
                <p style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,fontWeight:800,letterSpacing:"2px",textTransform:"uppercase",color:"var(--blue)",marginBottom:10}}>Macros manuales</p>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
                  {[{key:"calorias",label:"Kcal"},{key:"proteinas",label:"Prot g"},{key:"carbos",label:"Carbs g"},{key:"grasas",label:"Grasas g"}].map(f=>(
                    <div key={f.key}><label className="form-label">{f.label}</label><input type="number" min={0} value={manualVals[f.key]} onChange={e=>setManualVals(v=>({...v,[f.key]:e.target.value}))} style={{textAlign:"center",fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:900,padding:"6px 4px"}}/></div>
                  ))}
                </div>
              </div>
            )}
            {!manualEdit&&<div className="info-tip"><p>{!apiKey?"⚠️ Necesitas configurar tu API Key para estimar macros automáticamente.":"🤖 La IA estimará los macros automáticamente."}</p></div>}
            <div style={{marginTop:12}}>
              <label className="form-label">📷 Foto del platillo (opcional)</label>
              <div style={{border:"1.5px dashed var(--ink-muted)",borderRadius:2,padding:"10px 14px",background:"var(--bone-dark)",cursor:"pointer",textAlign:"center",position:"relative"}}
                onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor="var(--blue)";e.currentTarget.style.background="var(--blue-bg)";}}
                onDragLeave={e=>{e.currentTarget.style.borderColor="var(--ink-muted)";e.currentTarget.style.background="var(--bone-dark)";}}
                onDrop={e=>{e.preventDefault();e.currentTarget.style.borderColor="var(--ink-muted)";e.currentTarget.style.background="var(--bone-dark)";const f=e.dataTransfer.files[0];if(f&&f.type.startsWith("image/")){const r=new FileReader();r.onload=ev=>setMealImage(ev.target.result);r.readAsDataURL(f);}}}
                onClick={()=>document.getElementById("meal-img-input").click()}>
                <input id="meal-img-input" type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>setMealImage(ev.target.result);r.readAsDataURL(f);}}}/>
                {mealImage?(<div style={{position:"relative",display:"inline-block"}}><img src={mealImage} alt="platillo" style={{maxHeight:140,maxWidth:"100%",borderRadius:2,display:"block",margin:"0 auto"}}/><button onClick={e=>{e.stopPropagation();setMealImage(null);}} style={{position:"absolute",top:-6,right:-6,background:"var(--red)",color:"white",border:"none",borderRadius:"50%",width:20,height:20,fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900}}>×</button></div>)
                :(<div><div style={{fontSize:28,marginBottom:4}}>🍽</div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,fontWeight:800,letterSpacing:"1.5px",textTransform:"uppercase",color:"var(--ink-muted)"}}>Arrastra o toca para subir foto</div><div style={{fontSize:10,color:"var(--ink-faint)",marginTop:3}}>JPG, PNG, WEBP</div></div>)}
              </div>
            </div>
            <div style={{display:"flex",gap:6,marginTop:14}}>
              <button className="btn-main" onClick={saveMeal}>{manualEdit?"Guardar macros":mealImage?"Guardar + Analizar foto 📷":"Guardar + IA"}</button>
              {tempText&&<button className="btn-sec" onClick={()=>setTempText("")}>Borrar</button>}
              <button className="btn-sec" onClick={()=>{setModal(null);setMealImage(null);}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
