<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Wellness Tracker</title>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#1A1A2E"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Wellness"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bone:#F5F0E8;--bone-dark:#EDE7D9;--bone-mid:#D8D0C0;
  --ink:#1A1A2E;--ink-soft:#2E2E42;--ink-muted:#6B6B80;--ink-faint:#A8A8B8;
  --blue:#005EFF;--blue-light:#4080FF;--blue-bg:#EBF0FF;
  --line:#D0C8B8;--green:#00C853;--green-bg:#E8F5E9;
  --orange:#FF6D00;--red:#D50000;--today:#FFD600;--purple:#7B1FA2;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{font-family:'Barlow',sans-serif;background:var(--bone);color:var(--ink);height:100%;overflow-x:hidden;}
::-webkit-scrollbar{display:none;}
.app{min-height:100vh;background:var(--bone);padding-bottom:calc(72px + var(--safe-bot));}
.topbar{position:sticky;top:0;z-index:100;background:var(--ink);padding:calc(var(--safe-top) + 10px) 16px 10px;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;text-transform:uppercase;color:var(--bone);letter-spacing:-.5px;}
.topbar-sub{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px;}
.page{padding:16px 16px 8px;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--ink);border-top:2px solid rgba(255,255,255,.1);display:flex;padding-bottom:var(--safe-bot);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;cursor:pointer;gap:3px;border:none;background:transparent;}
.nav-item .ni-icon{font-size:20px;line-height:1;}
.nav-item .ni-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.4);}
.nav-item.active .ni-label{color:var(--today);}
.nav-item.active .ni-icon{filter:drop-shadow(0 0 4px var(--today));}

/* CARDS */
.card{background:var(--bone);border:1.5px solid var(--ink);border-radius:4px;overflow:hidden;margin-bottom:12px;}
.card-header{background:var(--ink);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.card-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;color:var(--bone);}

/* HERO STRIPS */
.hero-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1.5px solid var(--ink);border-radius:4px;margin-bottom:12px;overflow:hidden;}
.hero-cell{padding:12px 10px;border-right:1.5px solid var(--ink);text-align:center;}
.hero-cell:last-child{border-right:none;}
.hero-num{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;line-height:1;}
.hero-label{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-muted);margin-top:3px;}

/* DAY CARD (calendario) */
.day-strip{border:1.5px solid var(--ink);border-radius:4px;overflow:hidden;margin-bottom:10px;}
.day-strip-head{background:var(--ink-soft);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.day-strip-head.today-head{background:var(--ink);}
.day-strip-dow{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:1px;color:var(--bone);}
.day-strip-date{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:rgba(255,255,255,.5);}
.day-strip-kcal{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;}
.day-strip-body{padding:8px;}

/* MEAL ROW */
.meal-row-m{display:flex;align-items:center;border-bottom:1px solid var(--line);min-height:52px;cursor:pointer;active-opacity:.7;}
.meal-row-m:last-child{border-bottom:none;}
.meal-row-m:active{background:var(--bone-dark);}
.meal-icon-m{width:44px;height:52px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border-right:1px solid var(--line);background:var(--bone-dark);}
.meal-body-m{flex:1;padding:8px 10px;}
.meal-type-m{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--ink-muted);}
.meal-val-m{font-size:13px;font-weight:500;color:var(--ink);margin-top:2px;line-height:1.4;}
.meal-kcal-m{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;color:var(--blue);flex-shrink:0;padding-right:12px;}

/* WORKOUT BAR */
.workout-bar{display:flex;gap:6px;flex-wrap:wrap;padding:8px;}
.w-btn{flex:1;min-width:80px;padding:10px 6px;border:1.5px solid var(--line);background:var(--bone);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-muted);border-radius:3px;cursor:pointer;text-align:center;}
.w-btn.sel{color:white;border-color:transparent;}
.w-btn:active{opacity:.7;}

/* WATER BAR */
.water-row{display:flex;align-items:center;gap:10px;padding:10px 14px;}
.water-btn{width:44px;height:44px;border:1.5px solid var(--ink);background:var(--bone-dark);border-radius:3px;font-size:22px;font-weight:900;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-family:'Barlow Condensed',sans-serif;color:var(--blue);}
.water-btn:active{background:var(--ink);color:var(--bone);}
.water-track{flex:1;height:36px;background:var(--bone-dark);border:1.5px solid var(--ink);border-radius:3px;overflow:hidden;position:relative;}
.water-fill{height:100%;background:var(--blue);transition:width .3s;}
.water-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900;}

/* PESO */
.peso-big{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;line-height:1;text-align:center;padding:16px 0 8px;}
.peso-entry-m{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--line);}
.peso-entry-m:last-child{border-bottom:none;}

/* BTNS */
.btn{background:var(--ink);color:var(--bone);border:none;padding:14px 20px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border-radius:3px;width:100%;text-align:center;}
.btn:active{opacity:.7;}
.btn.blue{background:var(--blue);}
.btn.green{background:var(--green);}
.btn.orange{background:var(--orange);}
.btn.purple{background:var(--purple);}
.btn.red{background:var(--red);}
.btn.sec{background:transparent;color:var(--ink-muted);border:1.5px solid var(--line);}
.btn.sm{padding:10px 14px;font-size:11px;}
.btn-row{display:flex;gap:8px;margin-top:10px;}
.btn-row .btn{flex:1;}

input[type=text],input[type=number],input[type=date],textarea,.finput{background:var(--bone-dark);border:1.5px solid var(--ink);color:var(--ink);border-radius:3px;padding:12px 12px;font-family:'Barlow',sans-serif;font-size:15px;font-weight:500;width:100%;outline:none;}
input:focus,textarea:focus{border-color:var(--blue);}
textarea{resize:none;}
select.finput{cursor:pointer;font-size:15px;}
.flabel{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--ink-muted);margin-bottom:5px;display:block;}
.sec-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--ink-muted);margin-bottom:8px;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(26,26,46,.85);z-index:500;display:flex;align-items:flex-end;justify-content:center;padding:0;}
.modal-sheet{background:var(--bone);border-radius:16px 16px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:20px 16px calc(20px + var(--safe-bot));}
.modal-handle{width:40px;height:4px;background:var(--bone-mid);border-radius:2px;margin:0 auto 16px;}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:-.5px;margin-bottom:4px;}
.modal-sub{font-size:11px;color:var(--ink-muted);margin-bottom:16px;}

/* MACRO PILLS */
.mpill{display:inline-flex;align-items:center;padding:3px 8px;border-radius:3px;font-size:10px;font-weight:700;border:1.5px solid;margin-right:4px;margin-top:4px;}
.mpill.p{color:#1565C0;border-color:#1565C0;background:#E3F2FD;}
.mpill.c{color:#E65100;border-color:#E65100;background:#FFF3E0;}
.mpill.g{color:#558B2F;border-color:#558B2F;background:#F1F8E9;}
.kcal-badge{display:inline-flex;align-items:center;background:var(--green);color:white;padding:3px 8px;border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;margin-top:4px;}

/* API KEY */
.apikey-bar{background:#FFFDE7;border:2px solid var(--today);padding:12px 14px;border-radius:4px;margin-bottom:12px;}

/* INGR TAGS */
.ingr-tag{display:inline-flex;align-items:center;background:var(--bone-dark);border:1.5px solid var(--ink);padding:6px 12px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;border-radius:3px;cursor:pointer;margin:3px;}
.ingr-tag.sel{background:var(--blue);color:white;border-color:var(--blue);}

/* STEP PROGRESS */
.step-bar{display:flex;gap:0;border:1.5px solid var(--ink);border-radius:3px;overflow:hidden;margin-bottom:16px;}
.step-item{flex:1;padding:8px 4px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;background:var(--bone-dark);color:var(--ink-faint);border-right:1px solid var(--line);}
.step-item:last-child{border-right:none;}
.step-item.done{background:var(--green);color:white;}
.step-item.active{background:var(--ink);color:var(--today);}

/* DAY REC */
.day-rec{border:1.5px solid var(--line);border-radius:4px;overflow:hidden;margin-bottom:8px;}
.day-rec-head{background:var(--ink-soft);color:var(--bone);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}

/* HABIT GRID */
.habit-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.habit-cell{aspect-ratio:1;border-radius:2px;border:1px solid var(--line);cursor:pointer;}

/* SPEED BTNS */
.speed-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;}
.speed-btn{padding:10px 6px;border:1.5px solid var(--line);background:var(--bone);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;text-transform:uppercase;color:var(--ink-muted);border-radius:3px;cursor:pointer;text-align:center;}
.speed-btn.sel{background:var(--ink);color:var(--bone);border-color:var(--ink);}

/* INFO TIP */
.tip{background:var(--blue-bg);border-left:3px solid var(--blue);padding:10px 12px;border-radius:2px;margin:10px 0;}
.tip p{font-size:12px;color:var(--ink-soft);line-height:1.6;}

/* ERR */
.err{background:#FFEBEE;border:1.5px solid var(--red);padding:10px 14px;border-radius:3px;margin-bottom:10px;}
.err p{font-size:12px;color:var(--red);}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .2s ease forwards;}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner{display:inline-block;border:2px solid var(--bone-mid);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.pulsing{animation:pulse 1.5s infinite;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback,useEffect,useRef}=React;
const MODEL="claude-sonnet-4-20250514";
const MEALS=["desayuno","almuerzo","cena","snack"];
const MI={desayuno:"☀️",almuerzo:"🌤",cena:"🌙",snack:"◦"};
const ML={desayuno:"Desayuno",almuerzo:"Almuerzo",cena:"Cena",snack:"Snack"};
const WT=["Pesas","Cardio","HIIT","Funcional","Yoga","Descanso"];
const WC={Pesas:"#005EFF",Cardio:"#00C853",HIIT:"#D50000",Funcional:"#FF6D00",Yoga:"#7B1FA2",Descanso:"#78909C"};
const TODAY=new Date();TODAY.setHours(0,0,0,0);
const AM={sedentario:1.2,poco:1.375,moderado:1.55,muy:1.725};
const DOW=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const DOWFULL=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const MONTHS=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const INGR=["Pollo","Atún","Huevos","Avena","Arroz","Frijoles","Brócoli","Espinaca","Aguacate","Tomate","Tortillas","Pan integral","Yogur griego","Leche","Plátano","Manzana","Queso cottage","Lentejas","Aceite de oliva","Cebolla","Chile","Ajo"];
const SP=[
  {id:"muy_lento",label:"Muy lento",ajuste:{bajar:-100,mantener:0,musculo:100,rendimiento:100}},
  {id:"lento",label:"Lento",ajuste:{bajar:-250,mantener:0,musculo:200,rendimiento:150}},
  {id:"moderado",label:"Moderado",ajuste:{bajar:-400,mantener:0,musculo:300,rendimiento:200}},
  {id:"rapido",label:"Rápido",ajuste:{bajar:-600,mantener:0,musculo:400,rendimiento:300}},
  {id:"agresivo",label:"Agresivo",ajuste:{bajar:-800,mantener:0,musculo:500,rendimiento:400}},
];
const OM={bajar:{p:.35,c:.35,g:.30},mantener:{p:.25,c:.45,g:.30},musculo:{p:.30,c:.45,g:.25},rendimiento:{p:.25,c:.50,g:.25}};
const NREF=`DENSIDADES CALÓRICAS: Arroz cocido:1.3|Pasta:1.6|Pan:2.7|Avena:3.8|Pollo:1.65|Atún:1.16|Huevo:70kcal|Yogur griego:0.73|Aguacate:1.6|Frijoles:1.4|Brócoli:0.34|Plátano:0.89|Manzana:0.52`;
const DP={nombre:"",peso:"",estatura:"",edad:"",sexo:"m",actividad:"moderado",objetivo:"bajar",velocidad:"moderado",diasGym:5,inicioPlan:tk(TODAY),pesoMeta:""};

function tk(d){const dd=new Date(d);return`${dd.getFullYear()}-${String(dd.getMonth()+1).padStart(2,"0")}-${String(dd.getDate()).padStart(2,"0")}`;}
function fk(k){const[y,m,d]=k.split("-");return new Date(+y,+m-1,+d);}
function ad(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function sd(a,b){return tk(a)===tk(b);}
function ed(){return{meals:{desayuno:"",almuerzo:"",cena:"",snack:""},calorias:{desayuno:null,almuerzo:null,cena:null,snack:null},calLoading:{desayuno:false,almuerzo:false,cena:false,snack:false},workout:{done:false,type:""},water:0,recetas:{}};}
function cm(p){const{peso,estatura,edad,sexo,actividad,objetivo,velocidad}=p;if(!peso||!estatura||!edad)return null;const bmr=sexo==="m"?10*peso+6.25*estatura-5*edad+5:10*peso+6.25*estatura-5*edad-161;const tdee=bmr*(AM[actividad]||1.55);const spd=SP.find(s=>s.id===velocidad)||SP[2];const aj=spd.ajuste[objetivo]||0;const cals=Math.round(tdee+aj);const mac=OM[objetivo]||OM.mantener;return{calorias:cals,proteinas:Math.round((cals*mac.p)/4),carbos:Math.round((cals*mac.c)/4),grasas:Math.round((cals*mac.g)/9),tdee:Math.round(tdee)};}
function sLS(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function lLS(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}

async function callAI(sys,msg,tokens,key){
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:MODEL,max_tokens:tokens,system:sys,messages:[{role:"user",content:msg}]})});
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.content?.map(i=>i.text||"").join("")||"";
}

function Ring({pct,color,size=48,stroke=5}){
  const r=(size-stroke)/2,circ=2*Math.PI*r,off=circ-(Math.min(pct,100)/100)*circ;
  return(<svg width={size} height={size}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#D8D0C0" strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`}/></svg>);
}

function WeightChart({log,meta}){
  if(!log||log.length<2)return null;
  const s=[...log].sort((a,b)=>a.date.localeCompare(b.date));
  const W=340,H=160,PL=40,PR=12,PT=12,PB=28,iW=W-PL-PR,iH=H-PT-PB;
  const vals=s.map(e=>e.peso),all=meta?[...vals,+meta]:vals;
  const mn=Math.min(...all)-1,mx=Math.max(...all)+1,rng=mx-mn||1;
  const xOf=i=>PL+(s.length===1?iW/2:(i/(s.length-1))*iW);
  const yOf=v=>PT+iH-((v-mn)/rng)*iH;
  const pts=s.map((e,i)=>`${xOf(i)},${yOf(e.peso)}`);
  const line=`M ${pts.join(" L ")}`;
  const area=`M ${xOf(0)},${PT+iH} L ${pts.join(" L ")} L ${xOf(s.length-1)},${PT+iH} Z`;
  const isDown=vals[vals.length-1]<=vals[0],lc=isDown?"#00C853":"#FF6D00";
  const my=meta?yOf(+meta):null;
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:"auto"}}>
      <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={lc} stopOpacity=".2"/><stop offset="100%" stopColor={lc} stopOpacity="0"/></linearGradient><clipPath id="cc"><rect x={PL} y={PT} width={iW} height={iH}/></clipPath></defs>
      {[0,1,2,3].map(i=>{const v=mn+(i/3)*rng;return(<g key={i}><line x1={PL} x2={PL+iW} y1={yOf(v)} y2={yOf(v)} stroke="#D0C8B8" strokeWidth=".8" strokeDasharray="3,3"/><text x={PL-4} y={yOf(v)+3} textAnchor="end" fontSize="8" fill="#A8A8B8" fontFamily="'Barlow Condensed'">{v.toFixed(0)}</text></g>);})}
      {my&&<line x1={PL} x2={PL+iW} y1={my} y2={my} stroke="#005EFF" strokeWidth="1.5" strokeDasharray="5,4"/>}
      <path d={area} fill="url(#wg)" clipPath="url(#cc)"/>
      <path d={line} fill="none" stroke={lc} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" clipPath="url(#cc)"/>
      {s.map((e,i)=>{const x=xOf(i),y=yOf(e.peso),isE=i===0||i===s.length-1;const dt=fk(e.date);return(<g key={e.date}><circle cx={x} cy={y} r={isE?5:3} fill={isE?lc:"white"} stroke={lc} strokeWidth="2"/>{isE&&<text x={x} y={PT+iH+14} textAnchor="middle" fontSize="8" fill="#6B6B80" fontFamily="'Barlow Condensed'">{dt.getDate()}/{dt.getMonth()+1}</text>}{isE&&<text x={x} y={y-8} textAnchor="middle" fontSize="10" fill={lc} fontFamily="'Barlow Condensed'" fontWeight="700">{e.peso}</text>}</g>);})}
    </svg>
  );
}

// ══ APP ══
export default function App(){
  const [apiKey,setApiKey]=useState(()=>lLS("wt_ak",""));
  const [akInput,setAkInput]=useState("");
  const [view,setView]=useState("cal");
  const [data,setData]=useState(()=>lLS("wt_data",{}));
  const [perfil,setPerfil]=useState(()=>lLS("wt_perfil",DP));
  const [wlog,setWlog]=useState(()=>lLS("wt_wl",[]));
  const [selDate,setSelDate]=useState(new Date(TODAY));
  const [modal,setModal]=useState(null); // {type,meal?,date?}
  const [tempTxt,setTempTxt]=useState("");
  const [manEdit,setManEdit]=useState(false);
  const [manVals,setManVals]=useState({calorias:"",proteinas:"",carbos:"",grasas:""});
  const [mealImg,setMealImg]=useState(null);
  const [tmpP,setTmpP]=useState(DP);
  // week nav
  const [weekOff,setWeekOff]=useState(0);
  // recetario
  const [recStep,setRecStep]=useState(1);
  const [recIngr,setRecIngr]=useState("");
  const [recDias,setRecDias]=useState(7);
  const [recStart,setRecStart]=useState(tk(TODAY));
  const [recLoading,setRecLoading]=useState(false);
  const [recResult,setRecResult]=useState(null);
  const [recErr,setRecErr]=useState("");
  const [recOpen,setRecOpen]=useState(null);
  // autoplan
  const [planDays,setPlanDays]=useState(7);
  const [planStart,setPlanStart]=useState(tk(TODAY));
  const [planLoading,setPlanLoading]=useState(false);
  const [planResult,setPlanResult]=useState(null);
  const [planErr,setPlanErr]=useState("");
  // peso
  const [newPDate,setNewPDate]=useState(tk(TODAY));
  const [newPVal,setNewPVal]=useState("");

  useEffect(()=>sLS("wt_data",data),[data]);
  useEffect(()=>sLS("wt_perfil",perfil),[perfil]);
  useEffect(()=>sLS("wt_wl",wlog),[wlog]);

  const metas=cm(perfil);
  const gd=useCallback(d=>data[tk(d)]||ed(),[data]);
  const sd2=useCallback((d,upd)=>{const k=tk(d);setData(prev=>{const cur=prev[k]||ed();const next=typeof upd==="function"?upd(cur):{...cur,...upd};return{...prev,[k]:next};});},[]);

  // weight helpers
  const sw=[...wlog].sort((a,b)=>a.date.localeCompare(b.date));
  const pActual=sw.length>0?sw[sw.length-1].peso:null;
  const pInicial=sw.length>0?sw[0].peso:(+perfil.peso||null);
  const pDiff=pActual&&pInicial?+(pActual-pInicial).toFixed(1):null;
  const pPct=pInicial&&perfil.pesoMeta&&pActual?Math.min(100,Math.round(Math.abs((pInicial-pActual)/(pInicial-+perfil.pesoMeta))*100)):0;
  const addW=(dk,v)=>{const kg=parseFloat(v);if(!kg||kg<20||kg>300)return;setWlog(prev=>[...prev.filter(e=>e.date!==dk),{date:dk,peso:kg}]);};
  const remW=(dk)=>setWlog(prev=>prev.filter(e=>e.date!==dk));
  const getW=(dk)=>wlog.find(e=>e.date===dk)?.peso||null;

  // week days
  const weekDays=Array.from({length:7},(_,i)=>ad(TODAY,weekOff*7-(6-i)));
  const days7=Array.from({length:7},(_,i)=>ad(TODAY,-(6-i)));
  const gymDone=days7.filter(d=>gd(d).workout.done).length;
  const dietPct=Math.round((days7.filter(d=>MEALS.some(m=>gd(d).meals[m])).length/7)*100);
  const gymPct=Math.min(100,Math.round((gymDone/(perfil.diasGym||5))*100));

  // save meal
  const saveMeal=useCallback(async()=>{
    if(!modal||modal.type!=="meal")return;
    const{meal,date}=modal,txt=tempTxt.trim(),k=tk(date),img=mealImg;
    if(manEdit){
      const mv={calorias:+manVals.calorias||null,proteinas:+manVals.proteinas||null,carbos:+manVals.carbos||null,grasas:+manVals.grasas||null,confianza:"manual"};
      setData(prev=>{const cur=prev[k]||ed();const rec={...(cur.recetas||{})};delete rec[meal];return{...prev,[k]:{...cur,meals:{...cur.meals,[meal]:txt},calorias:{...cur.calorias,[meal]:mv},calLoading:{...cur.calLoading,[meal]:false},recetas:rec}};});
      setModal(null);setMealImg(null);return;
    }
    setData(prev=>{const cur=prev[k]||ed();const rec={...(cur.recetas||{})};delete rec[meal];return{...prev,[k]:{...cur,meals:{...cur.meals,[meal]:txt},calorias:{...cur.calorias,[meal]:txt?cur.calorias[meal]:null},calLoading:{...cur.calLoading,[meal]:!!(txt||img)},recetas:rec}};});
    setModal(null);setMealImg(null);
    if((!txt&&!img)||!apiKey)return;
    try{
      const uc=img?[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:img.split(",")[1]}},{type:"text",text:txt?`Analiza imagen y texto: ${txt}`:"Analiza imagen, estima macros."}]:txt;
      const t=await callAI(`Nutricionista. Ref:\n${NREF}\nSOLO JSON: {"calorias":450,"proteinas":25,"carbos":50,"grasas":15,"confianza":"alta|media|baja"}`,uc,400,apiKey);
      const res=JSON.parse(t.replace(/```json|```/g,"").trim());
      setData(prev=>{const cur=prev[k]||ed();return{...prev,[k]:{...cur,calorias:{...cur.calorias,[meal]:res},calLoading:{...cur.calLoading,[meal]:false}}};});
    }catch{setData(prev=>{const cur=prev[k]||ed();return{...prev,[k]:{...cur,calLoading:{...cur.calLoading,[meal]:false}}};});}
  },[modal,tempTxt,manEdit,manVals,mealImg,apiKey]);

  const delMeal=(d,meal)=>{const k=tk(d);setData(prev=>{const cur=prev[k]||ed();const rec={...(cur.recetas||{})};delete rec[meal];return{...prev,[k]:{...cur,meals:{...cur.meals,[meal]:""},calorias:{...cur.calorias,[meal]:null},recetas:rec}};});};

  const openMeal=(meal,date)=>{const ex=gd(date).calorias[meal];setModal({type:"meal",meal,date});setTempTxt(gd(date).meals[meal]||"");setManEdit(false);setManVals(ex?{calorias:ex.calorias||"",proteinas:ex.proteinas||"",carbos:ex.carbos||"",grasas:ex.grasas||""}:{calorias:"",proteinas:"",carbos:"",grasas:""});setMealImg(null);};

  // autoplan
  const doAutoPlan=async()=>{
    if(!metas||!apiKey){setPlanErr(!apiKey?"Necesitas API Key":"Configura perfil");return;}
    setPlanLoading(true);setPlanErr("");setPlanResult(null);
    try{const t=await callAI("Nutricionista. SOLO JSON array.",`Genera ${planDays} días variados, objetivo=${perfil.objetivo}, ${metas.calorias}kcal. Array: [{"desayuno":"","almuerzo":"","cena":"","snack":"","cal_desayuno":0,"cal_almuerzo":0,"cal_cena":0,"cal_snack":0}]`,2500,apiKey);const m=t.replace(/```json|```/g,"").trim().match(/\[[\s\S]*\]/);if(!m)throw new Error("JSON inválido");setPlanResult(JSON.parse(m[0]));}
    catch(ex){setPlanErr(`Error: ${ex.message}`);}
    finally{setPlanLoading(false);}
  };
  const applyPlan=()=>{
    if(!planResult)return;
    planResult.forEach((day,i)=>{const date=ad(fk(planStart),i),k=tk(date);setData(prev=>{const nd={...(prev[k]||ed())};nd.meals={desayuno:day.desayuno,almuerzo:day.almuerzo,cena:day.cena,snack:day.snack};nd.calorias={desayuno:{calorias:day.cal_desayuno},almuerzo:{calorias:day.cal_almuerzo},cena:{calorias:day.cal_cena},snack:{calorias:day.cal_snack}};nd.recetas={};return{...prev,[k]:nd};});});
    setPlanResult(null);
  };

  // recetario
  const doRecetario=async()=>{
    if(!metas||!apiKey){setRecErr(!apiKey?"Necesitas API Key":"Configura perfil");return;}
    setRecLoading(true);setRecErr("");setRecResult(null);
    const dist={desayuno:Math.round(metas.calorias*.25),almuerzo:Math.round(metas.calorias*.35),cena:Math.round(metas.calorias*.30),snack:Math.round(metas.calorias*.10)};
    const prompt=`Chef nutricionista mexicano. Ingredientes: ${recIngr}\nMetas: ${metas.calorias}kcal P:${metas.proteinas}g C:${metas.carbos}g G:${metas.grasas}g. Objetivo: ${perfil.objetivo}\nDist: D:${dist.desayuno} A:${dist.almuerzo} C:${dist.cena} S:${dist.snack}\nCrea ${recDias} días VARIADOS. SOLO JSON array:\n[{"dia":1,"desayuno":{"nombre":"...","preparacion":"...","cal":250},"almuerzo":{"nombre":"...","preparacion":"...","cal":400},"cena":{"nombre":"...","preparacion":"...","cal":350},"snack":{"nombre":"...","preparacion":"...","cal":150}}]`;
    try{const t=await callAI("Chef nutricionista. SOLO JSON.",prompt,5000,apiKey);const m=t.replace(/```json|```/g,"").trim().match(/\[[\s\S]*\]/);if(!m)throw new Error("JSON inválido");setRecResult(JSON.parse(m[0]));setRecStep(3);}
    catch(ex){setRecErr(`Error: ${ex.message}`);}
    finally{setRecLoading(false);}
  };
  const applyRec=()=>{
    if(!recResult)return;
    recResult.forEach((day,i)=>{const date=ad(fk(recStart),i),k=tk(date);setData(prev=>{const cur=prev[k]||ed();return{...prev,[k]:{...cur,meals:{desayuno:day.desayuno.nombre,almuerzo:day.almuerzo.nombre,cena:day.cena.nombre,snack:day.snack.nombre},calorias:{desayuno:{calorias:day.desayuno.cal,confianza:"alta"},almuerzo:{calorias:day.almuerzo.cal,confianza:"alta"},cena:{calorias:day.cena.cal,confianza:"alta"},snack:{calorias:day.snack.cal,confianza:"alta"}},recetas:{desayuno:day.desayuno,almuerzo:day.almuerzo,cena:day.cena,snack:day.snack}}};});});
    setRecStep(4);setView("cal");
  };

  const selD=gd(selDate);
  const selCals=MEALS.reduce((s,m)=>s+(selD.calorias[m]?.calorias||0),0);

  // ── RENDER ──
  return(
    <div className="app">

      {/* TOPBAR */}
      <div className="topbar">
        <div>
          <div className="topbar-title">{perfil.nombre||"Wellness"} 💪</div>
          <div className="topbar-sub">{TODAY.toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"long"})}</div>
        </div>
        {pActual&&<div style={{textAlign:"right"}}><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:900,color:pDiff<=0?"var(--green)":"var(--orange)"}}>{pActual}kg</div><div style={{fontSize:9,color:"rgba(255,255,255,.5)"}}>{pDiff!==null?(pDiff<=0?`▼ ${Math.abs(pDiff)}kg`:`▲ +${pDiff}kg`):"peso"}</div></div>}
      </div>

      {/* API KEY */}
      {!apiKey&&(
        <div className="page">
          <div className="apikey-bar">
            <p style={{fontSize:13,fontWeight:700,marginBottom:8}}>🔑 Necesitas tu API Key de Anthropic para las funciones de IA</p>
            <p style={{fontSize:11,color:"var(--ink-muted)",marginBottom:10}}>Consíguela gratis en <b>console.anthropic.com</b></p>
            <input type="text" placeholder="sk-ant-api03-..." value={akInput} onChange={e=>setAkInput(e.target.value)} style={{marginBottom:8,fontFamily:"monospace",fontSize:12}}/>
            <button className="btn sm green" onClick={()=>{if(akInput.startsWith("sk-")){setApiKey(akInput);sLS("wt_ak",akInput);}else alert("Debe empezar con sk-");}}>Guardar API Key</button>
          </div>
        </div>
      )}

      {/* ══ CALENDARIO ══ */}
      {view==="cal"&&(
        <div className="page fade-up">
          {/* Hero */}
          <div className="hero-strip">
            <div className="hero-cell">
              <Ring pct={dietPct} color={dietPct>=80?"var(--green)":dietPct>=50?"var(--orange)":"var(--red)"}/>
              <div className="hero-num" style={{color:dietPct>=80?"var(--green)":dietPct>=50?"var(--orange)":"var(--red)",fontSize:20}}>{dietPct}%</div>
              <div className="hero-label">Dieta</div>
            </div>
            <div className="hero-cell">
              <Ring pct={gymPct} color={gymPct>=100?"var(--green)":gymPct>=60?"var(--blue)":"var(--orange)"}/>
              <div className="hero-num" style={{color:gymPct>=100?"var(--green)":gymPct>=60?"var(--blue)":"var(--orange)",fontSize:20}}>{gymPct}%</div>
              <div className="hero-label">Gym</div>
            </div>
            <div className="hero-cell">
              <div className="hero-num" style={{color:"var(--blue)",fontSize:pActual?24:18}}>{pActual?`${pActual}kg`:"—"}</div>
              <div className="hero-label">Peso</div>
              {metas&&<div style={{fontSize:9,color:"var(--ink-muted)",marginTop:2}}>{metas.calorias} kcal</div>}
            </div>
          </div>

          {/* Week nav */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <button onClick={()=>setWeekOff(w=>w-1)} style={{background:"var(--bone-dark)",border:"1.5px solid var(--ink)",width:40,height:40,borderRadius:3,fontSize:18,cursor:"pointer",fontWeight:900}}>‹</button>
            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:800,textTransform:"uppercase",letterSpacing:".5px"}}>{weekOff===0?"Esta semana":weekOff===-1?"Sem. pasada":`${weekDays[0].getDate()}/${weekDays[0].getMonth()+1} – ${weekDays[6].getDate()}/${weekDays[6].getMonth()+1}`}</span>
            <button onClick={()=>setWeekOff(w=>Math.min(w+1,0))} style={{background:"var(--bone-dark)",border:"1.5px solid var(--ink)",width:40,height:40,borderRadius:3,fontSize:18,cursor:"pointer",fontWeight:900,opacity:weekOff===0?.3:1}} disabled={weekOff===0}>›</button>
          </div>

          {/* Day strips */}
          {weekDays.map(d=>{
            const k=tk(d),dd=data[k]||ed();
            const tc=MEALS.reduce((s,m)=>s+(dd.calorias[m]?.calorias||0),0);
            const isT=sd(d,TODAY),isS=sd(d,selDate);
            const hasAny=MEALS.some(m=>dd.meals[m]);
            return(
              <div key={k} className="day-strip" style={{borderColor:isS?"var(--blue)":isT?"var(--today)":"var(--ink)"}}>
                <div className={`day-strip-head ${isT?"today-head":""}`} onClick={()=>setSelDate(new Date(d))} style={{background:isS?"var(--blue)":isT?"var(--orange)":"var(--ink-soft)"}}>
                  <div>
                    <div className="day-strip-dow">{DOWFULL[d.getDay()]}{isT&&<span style={{background:"var(--today)",color:"var(--ink)",fontSize:8,fontWeight:900,padding:"1px 5px",marginLeft:8,borderRadius:1}}>HOY</span>}</div>
                    <div className="day-strip-date">{d.getDate()} {MONTHS[d.getMonth()]}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    {dd.workout.done&&<div style={{background:WC[dd.workout.type]||"var(--green)",padding:"2px 8px",borderRadius:2,fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,fontWeight:800,color:"white"}}>{dd.workout.type||"Gym"}</div>}
                    {tc>0&&<div className="day-strip-kcal" style={{color:metas&&tc>=metas.calorias*.85?"var(--green)":"var(--today)"}}>{tc}</div>}
                    <div style={{fontSize:16,color:"rgba(255,255,255,.5)"}}>{isS?"▲":"▼"}</div>
                  </div>
                </div>
                {isS&&(
                  <div>
                    {/* Meals */}
                    {MEALS.map(meal=>{
                      const val=dd.meals[meal],cal=dd.calorias[meal],loading=dd.calLoading[meal],hasRec=dd.recetas?.[meal];
                      return(
                        <div key={meal} className="meal-row-m" onClick={()=>openMeal(meal,d)} style={{background:hasRec?"#F9F0FF":val?"var(--blue-bg)":"transparent"}}>
                          <div className="meal-icon-m">{MI[meal]}</div>
                          <div className="meal-body-m">
                            <div className="meal-type-m">{ML[meal]}</div>
                            {val?<div className="meal-val-m">{hasRec?hasRec.nombre:val}</div>:<div style={{fontSize:12,color:"var(--ink-faint)",marginTop:2}}>Toca para registrar</div>}
                            {loading&&<div style={{display:"flex",alignItems:"center",gap:5,marginTop:3}}><div className="spinner" style={{width:10,height:10}}/><span style={{fontSize:10,color:"var(--ink-muted)"}}>Calculando…</span></div>}
                            {!loading&&cal?.calorias&&<div><span className="kcal-badge">🔥 {cal.calorias}</span>{cal.proteinas&&<span className="mpill p">P:{cal.proteinas}g</span>}{cal.carbos&&<span className="mpill c">C:{cal.carbos}g</span>}</div>}
                          </div>
                          {val&&<button onClick={e=>{e.stopPropagation();delMeal(d,meal);}} style={{width:36,height:36,background:"transparent",border:"none",color:"var(--ink-faint)",fontSize:18,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",marginRight:4}}>×</button>}
                        </div>
                      );
                    })}
                    {/* Workout */}
                    <div style={{padding:"10px 14px",borderTop:"1px solid var(--line)"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                        <button onClick={()=>sd2(d,day=>({...day,workout:{...day.workout,done:!day.workout.done}}))}
                          style={{width:44,height:44,borderRadius:3,border:"2px solid var(--ink)",background:dd.workout.done?"var(--blue)":"transparent",color:dd.workout.done?"white":"var(--ink-muted)",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900}}>
                          {dd.workout.done?"✓":"○"}
                        </button>
                        <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:13,fontWeight:900,color:dd.workout.done?"var(--blue)":"var(--ink-muted)"}}>{dd.workout.done?"¡Completado!":"Marcar gym"}</span>
                      </div>
                      <div className="workout-bar">
                        {WT.map(w=><button key={w} className={`w-btn ${dd.workout.type===w?"sel":""}`} style={dd.workout.type===w?{background:WC[w]}:{}} onClick={()=>sd2(d,day=>({...day,workout:{...day.workout,type:w,done:true}}))}>{w}</button>)}
                      </div>
                    </div>
                    {/* Water */}
                    <div className="water-row" style={{borderTop:"1px solid var(--line)"}}>
                      <button className="water-btn" onClick={()=>sd2(d,day=>({...day,water:Math.max(0,day.water-.5)}))}>−</button>
                      <div className="water-track">
                        <div className="water-fill" style={{width:`${Math.min((dd.water/2.5)*100,100)}%`}}/>
                        <div className="water-label">💧 {dd.water}L / 2.5L</div>
                      </div>
                      <button className="water-btn" onClick={()=>sd2(d,day=>({...day,water:Math.min(5,day.water+.5)}))}>+</button>
                    </div>
                    {/* Peso */}
                    <div style={{padding:"10px 14px",borderTop:"1px solid var(--line)",display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:20}}>⚖️</span>
                      <div style={{flex:1}}>
                        {getW(k)?<div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:900,color:"var(--blue)"}}>{getW(k)} kg</div>:<div style={{fontSize:12,color:"var(--ink-muted)"}}>Sin peso registrado</div>}
                      </div>
                      <input type="number" step=".1" min={20} max={300} placeholder="75.0" id={`pw-${k}`} style={{width:72,padding:"10px 8px",textAlign:"center",fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:900}}/>
                      <button className="btn sm green" style={{width:44,padding:"10px 0"}} onClick={()=>{const el=document.getElementById(`pw-${k}`);if(el){addW(k,el.value);el.value="";}}} >✓</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* ══ PESO ══ */}
      {view==="peso"&&(
        <div className="page fade-up">
          <p className="sec-label">Seguimiento de peso</p>
          {pActual?(
            <div className="peso-big" style={{color:pDiff<=0?"var(--green)":"var(--orange)"}}>{pActual}<span style={{fontSize:24,color:"var(--ink-muted)",fontWeight:400}}>kg</span></div>
          ):(
            <div className="peso-big" style={{color:"var(--ink-faint)"}}>—</div>
          )}
          {pActual&&pInicial&&(
            <div style={{display:"flex",gap:16,justifyContent:"center",marginBottom:16,flexWrap:"wrap"}}>
              <div style={{textAlign:"center"}}><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:900,color:"var(--ink-muted)"}}>{pInicial}kg</div><div style={{fontSize:9,color:"var(--ink-faint)",fontWeight:700,letterSpacing:"1px",textTransform:"uppercase"}}>Inicio</div></div>
              <div style={{textAlign:"center"}}><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:900,color:pDiff<=0?"var(--green)":"var(--orange)"}}>{pDiff>0?"+":""}{pDiff}kg</div><div style={{fontSize:9,color:"var(--ink-faint)",fontWeight:700,letterSpacing:"1px",textTransform:"uppercase"}}>Cambio</div></div>
              {perfil.pesoMeta&&<div style={{textAlign:"center"}}><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:900,color:"var(--blue)"}}>{perfil.pesoMeta}kg</div><div style={{fontSize:9,color:"var(--ink-faint)",fontWeight:700,letterSpacing:"1px",textTransform:"uppercase"}}>Meta</div></div>}
            </div>
          )}
          {perfil.pesoMeta&&pActual&&pInicial&&(
            <div style={{margin:"0 0 16px",padding:"12px 14px",border:"1.5px solid var(--blue)",background:"var(--blue-bg)",borderRadius:4}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:800,letterSpacing:"1.5px",textTransform:"uppercase",color:"var(--blue)"}}>Progreso a la meta</span>
                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:900,color:"var(--blue)"}}>{pPct}%</span>
              </div>
              <div style={{height:10,background:"var(--bone-mid)",borderRadius:5,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${pPct}%`,background:pPct>=100?"var(--green)":"var(--blue)",borderRadius:5,transition:"width .8s"}}/>
              </div>
            </div>
          )}
          <div className="card" style={{marginBottom:12}}>
            <div className="card-header"><span className="card-title">📈 Gráfica</span></div>
            <div style={{padding:12}}>
              {sw.length>=2?<WeightChart log={wlog} meta={perfil.pesoMeta}/>:<div style={{textAlign:"center",padding:"24px 0",color:"var(--ink-muted)",fontSize:13}}>Necesitas 2+ registros para ver la gráfica</div>}
            </div>
          </div>
          <div className="card" style={{marginBottom:12}}>
            <div className="card-header"><span className="card-title">+ Registrar</span></div>
            <div style={{padding:12,display:"flex",gap:8}}>
              <div style={{flex:1}}><label className="flabel">Fecha</label><input type="date" value={newPDate} onChange={e=>setNewPDate(e.target.value)}/></div>
              <div style={{flex:1}}><label className="flabel">Peso (kg)</label><input type="number" step=".1" min={20} max={300} placeholder="75.0" value={newPVal} onChange={e=>setNewPVal(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&newPVal){addW(newPDate,newPVal);setNewPVal("");}}} /></div>
            </div>
            <div style={{padding:"0 12px 12px"}}><button className="btn green" disabled={!newPVal} onClick={()=>{addW(newPDate,newPVal);setNewPVal("");}}>✓ Guardar peso</button></div>
          </div>
          {sw.length>0&&(
            <div className="card">
              <div className="card-header"><span className="card-title">Historial</span></div>
              {[...sw].reverse().map((e,i,arr)=>{const prev=arr[i+1];const diff=prev?+(e.peso-prev.peso).toFixed(1):null;const dt=fk(e.date);return(
                <div key={e.date} className="peso-entry-m">
                  <div>
                    <div style={{fontSize:11,color:"var(--ink-muted)",fontWeight:600}}>{dt.toLocaleDateString("es-MX",{weekday:"short",day:"numeric",month:"short",year:"numeric"})}</div>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:900,color:"var(--blue)"}}>{e.peso} kg</div>
                    {diff!==null&&<div style={{fontSize:12,fontWeight:800,color:diff<=0?"var(--green)":"var(--orange)"}}>{diff<=0?`▼ ${Math.abs(diff)}kg`:`▲ +${diff}kg`}</div>}
                  </div>
                  <button onClick={()=>remW(e.date)} style={{background:"transparent",border:"1.5px solid var(--line)",color:"var(--ink-faint)",width:36,height:36,borderRadius:3,cursor:"pointer",fontSize:16,fontWeight:900}}>×</button>
                </div>
              );})}
            </div>
          )}
        </div>
      )}

      {/* ══ RECETARIO ══ */}
      {view==="rec"&&(
        <div className="page fade-up">
          <p className="sec-label">Chef IA</p>
          <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:32,fontWeight:900,textTransform:"uppercase",letterSpacing:"-1px",marginBottom:4}}>Recetario <span style={{color:"var(--purple)"}}>Personal</span></h2>
          {!metas&&<div style={{textAlign:"center",padding:"24px 0"}}><p style={{marginBottom:12,color:"var(--ink-muted)"}}>Configura tu perfil primero</p><button className="btn" onClick={()=>setView("perfil")}>Ir al perfil →</button></div>}
          {metas&&(
            <>
              <div className="step-bar">
                {[{n:1,l:"Ingredientes"},{n:2,l:"Config."},{n:3,l:"Vista previa"},{n:4,l:"¡Listo!"}].map(s=>(
                  <div key={s.n} className={`step-item ${recStep>s.n?"done":recStep===s.n?"active":""}`}>{recStep>s.n?"✓":s.n} {s.l}</div>
                ))}
              </div>
              {recStep===1&&(
                <div>
                  <p className="sec-label">¿Qué tienes en casa?</p>
                  <div style={{marginBottom:12}}>{INGR.map(ingr=>{const sel=recIngr.includes(ingr);return(<button key={ingr} className={`ingr-tag ${sel?"sel":""}`} onClick={()=>setRecIngr(prev=>sel?prev.replace(new RegExp(`,?\\s*${ingr}\\s*,?`,"i"),"").replace(/^,\s*/,"").replace(/,\s*$/,"").trim():prev?`${prev}, ${ingr}`:ingr)}>{sel&&"✓ "}{ingr}</button>);})}</div>
                  <label className="flabel">O escribe lo que tienes</label>
                  <textarea rows={3} placeholder="Ej: 4 pechugas, 12 huevos, arroz…" value={recIngr} onChange={e=>setRecIngr(e.target.value)} style={{marginBottom:12}}/>
                  <button className="btn purple" disabled={!recIngr.trim()} onClick={()=>setRecStep(2)}>Continuar →</button>
                </div>
              )}
              {recStep===2&&(
                <div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                    <div><label className="flabel">Fecha inicio</label><input type="date" value={recStart} onChange={e=>setRecStart(e.target.value)}/></div>
                    <div><label className="flabel">Días: {recDias}</label><input type="range" min={1} max={14} value={recDias} onChange={e=>setRecDias(+e.target.value)} style={{width:"100%",accentColor:"var(--purple)",marginTop:14}}/></div>
                  </div>
                  {recErr&&<div className="err"><p>⚠️ {recErr}</p></div>}
                  <button className="btn purple" disabled={recLoading||!apiKey} onClick={doRecetario}>{recLoading?<span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><div className="spinner" style={{width:16,height:16,borderWidth:2}}/> Creando…</span>:!apiKey?"Necesitas API Key":`🍽 Crear ${recDias} días`}</button>
                  <div className="btn-row"><button className="btn sec" onClick={()=>setRecStep(1)}>← Atrás</button></div>
                </div>
              )}
              {recStep===3&&recResult&&(
                <div>
                  <div className="btn-row" style={{marginBottom:12}}>
                    <button className="btn green" onClick={applyRec}>✓ Aplicar al calendario</button>
                    <button className="btn sec" onClick={()=>{setRecStep(2);setRecResult(null);}}>↻</button>
                  </div>
                  {recResult.map((day,idx)=>{
                    const date=ad(fk(recStart),idx);
                    const tc=(day.desayuno?.cal||0)+(day.almuerzo?.cal||0)+(day.cena?.cal||0)+(day.snack?.cal||0);
                    const isO=recOpen===idx;
                    return(
                      <div key={idx} className="day-rec">
                        <div className="day-rec-head" onClick={()=>setRecOpen(isO?null:idx)}>
                          <div>
                            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:14,fontWeight:900,textTransform:"uppercase"}}>{date.toLocaleDateString("es-MX",{weekday:"short",day:"numeric",month:"short"})}{sd(date,TODAY)&&<span style={{background:"var(--today)",color:"var(--ink)",fontSize:8,fontWeight:900,padding:"1px 5px",marginLeft:6,borderRadius:1}}>HOY</span>}</div>
                            {!isO&&<div style={{fontSize:10,color:"rgba(255,255,255,.5)",marginTop:2}}>{[day.desayuno,day.almuerzo,day.cena,day.snack].map(m=>m?.nombre||"").join(" · ")}</div>}
                          </div>
                          <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:900,color:"var(--today)"}}>{tc}</span>
                            <span style={{fontSize:14,opacity:.5}}>{isO?"▲":"▼"}</span>
                          </div>
                        </div>
                        {isO&&MEALS.map(meal=>{const r=day[meal];if(!r)return null;return(
                          <div key={meal} style={{display:"flex",borderBottom:"1px solid var(--line)"}}>
                            <div style={{width:44,background:"var(--bone-dark)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,borderRight:"1px solid var(--line)",flexShrink:0}}>{MI[meal]}</div>
                            <div style={{flex:1,padding:"10px 12px"}}>
                              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:900}}>{r.nombre}</div>
                              {r.preparacion&&<div style={{fontSize:11,color:"var(--ink-soft)",marginTop:4,lineHeight:1.5}}>{r.preparacion}</div>}
                              <span style={{fontSize:11,fontWeight:800,color:"var(--green)",marginTop:4,display:"inline-block"}}>{r.cal} kcal</span>
                            </div>
                          </div>
                        );})}
                      </div>
                    );
                  })}
                </div>
              )}
              {recStep===4&&(
                <div style={{textAlign:"center",padding:"40px 0"}}>
                  <div style={{fontSize:56,marginBottom:12}}>✅</div>
                  <h3 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:900,textTransform:"uppercase",marginBottom:16}}>¡Aplicado!</h3>
                  <div className="btn-row">
                    <button className="btn green" onClick={()=>setView("cal")}>Ver calendario →</button>
                    <button className="btn sec" onClick={()=>{setRecStep(1);setRecResult(null);setRecErr("");}}>Crear otro</button>
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      )}

      {/* ══ AUTO-PLAN ══ */}
      {view==="plan"&&(
        <div className="page fade-up">
          <p className="sec-label">Planificador rápido</p>
          <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:32,fontWeight:900,textTransform:"uppercase",letterSpacing:"-1px",marginBottom:12}}>Auto-Plan IA 🤖</h2>
          {!metas?<div style={{textAlign:"center",padding:"24px 0"}}><p style={{marginBottom:12,color:"var(--ink-muted)"}}>Configura tu perfil primero</p><button className="btn" onClick={()=>setView("perfil")}>Ir al perfil →</button></div>:(
            <>
              {metas&&<div style={{background:"var(--blue-bg)",border:"1.5px solid var(--blue)",padding:"10px 14px",borderRadius:4,marginBottom:12,display:"flex",gap:16,flexWrap:"wrap"}}><span style={{fontSize:12}}>🎯 <b>{perfil.objetivo}</b></span><span style={{fontSize:12}}>🔥 <b style={{color:"var(--blue)"}}>{metas.calorias} kcal</b></span></div>}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                <div><label className="flabel">Fecha inicio</label><input type="date" value={planStart} onChange={e=>setPlanStart(e.target.value)}/></div>
                <div><label className="flabel">Días: {planDays}</label><input type="range" min={1} max={14} value={planDays} onChange={e=>setPlanDays(+e.target.value)} style={{width:"100%",accentColor:"var(--blue)",marginTop:14}}/></div>
              </div>
              {planErr&&<div className="err"><p>⚠️ {planErr}</p></div>}
              {!planResult&&<button className="btn orange" disabled={planLoading||!apiKey} onClick={doAutoPlan}>{planLoading?<span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><div className="spinner" style={{width:16,height:16,borderWidth:2}}/> Generando…</span>:!apiKey?"Necesitas API Key":`🤖 Generar ${planDays} días`}</button>}
              {planResult&&(
                <div>
                  <div className="btn-row" style={{marginBottom:12}}>
                    <button className="btn green" onClick={applyPlan}>✓ Aplicar</button>
                    <button className="btn sec" onClick={()=>setPlanResult(null)}>Descartar</button>
                  </div>
                  {planResult.map((d,i)=>{
                    const date=ad(fk(planStart),i);
                    const tc=(d.cal_desayuno||0)+(d.cal_almuerzo||0)+(d.cal_cena||0)+(d.cal_snack||0);
                    return(
                      <div key={i} className="card" style={{marginBottom:8}}>
                        <div className="card-header">
                          <span className="card-title">{date.toLocaleDateString("es-MX",{weekday:"short",day:"numeric",month:"short"})}{sd(date,TODAY)&&<span style={{background:"var(--today)",color:"var(--ink)",fontSize:8,padding:"1px 5px",marginLeft:6,borderRadius:1}}>HOY</span>}</span>
                          <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:900,color:"var(--today)"}}>{tc} kcal</span>
                        </div>
                        <div style={{padding:10,display:"grid",gap:6}}>
                          {MEALS.map(m=><div key={m} style={{background:"var(--bone-dark)",padding:"8px 10px",borderRadius:3,fontSize:12}}><span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:9,fontWeight:800,letterSpacing:"1.5px",textTransform:"uppercase",color:"var(--blue)",marginRight:6}}>{MI[m]} {m}</span>{d[m]}</div>)}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </>
          )}
        </div>
      )}

      {/* ══ HÁBITOS ══ */}
      {view==="hab"&&(
        <div className="page fade-up">
          <p className="sec-label">Últimos 30 días</p>
          <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:32,fontWeight:900,textTransform:"uppercase",letterSpacing:"-1px",marginBottom:16}}>Hábitos 📊</h2>
          {(()=>{
            const days30=Array.from({length:30},(_,i)=>ad(TODAY,-(29-i)));
            const rows=[
              {label:"Comidas",fn:d=>{const dd=data[tk(d)];const n=dd?MEALS.filter(m=>dd.meals[m]).length:0;return`rgba(0,94,255,${n/4})`;}},
              {label:"Gym",fn:d=>{const dd=data[tk(d)];return dd?.workout?.done?(WC[dd.workout.type]||"var(--green)"):"rgba(0,200,83,.08)";}},
              {label:"Agua",fn:d=>{const w=data[tk(d)]?.water||0;return`rgba(66,165,245,${Math.min(w/2.5,1)})`;}}
            ];
            const stats=[
              {l:"Días con comidas",v:days30.filter(d=>MEALS.some(m=>data[tk(d)]?.meals[m])).length,c:"var(--blue)"},
              {l:"Días de gym",v:days30.filter(d=>data[tk(d)]?.workout?.done).length,c:"var(--green)"},
              {l:"Pesajes",v:wlog.filter(e=>{const d=fk(e.date);return(TODAY-d)<=30*86400000;}).length,c:"var(--orange)"},
              {l:"Días con recetas",v:days30.filter(d=>data[tk(d)]?.recetas&&Object.keys(data[tk(d)].recetas).length>0).length,c:"var(--purple)"}
            ];
            return(
              <>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
                  {stats.map(s=>(
                    <div key={s.l} style={{border:"1.5px solid var(--ink)",padding:"12px 14px",borderRadius:4,background:"var(--bone)"}}>
                      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:36,fontWeight:900,color:s.c}}>{s.v}<span style={{fontSize:14,color:"var(--ink-faint)",fontWeight:400}}>/30</span></div>
                      <div style={{fontSize:10,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",color:"var(--ink-muted)",marginTop:2}}>{s.l}</div>
                      <div style={{height:4,background:"var(--bone-dark)",marginTop:8,borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${(s.v/30)*100}%`,background:s.c,borderRadius:2}}/></div>
                    </div>
                  ))}
                </div>
                {rows.map(row=>(
                  <div key={row.label} style={{marginBottom:16}}>
                    <p className="sec-label">{row.label}</p>
                    <div className="habit-grid">
                      {days30.map((d,i)=>(
                        <div key={i} className="habit-cell" style={{background:row.fn(d),border:sd(d,TODAY)?"2px solid var(--today)":"1px solid var(--line)"}} title={d.toLocaleDateString("es-MX")} onClick={()=>{setSelDate(new Date(d));setView("cal");}}/>
                      ))}
                    </div>
                  </div>
                ))}
              </>
            );
          })()}
        </div>
      )}

      {/* ══ PERFIL ══ */}
      {view==="perfil"&&(
        <div className="page fade-up">
          <p className="sec-label">Configuración</p>
          <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:32,fontWeight:900,textTransform:"uppercase",letterSpacing:"-1px",marginBottom:16}}>Tu Perfil ⚙️</h2>
          {apiKey&&<div style={{background:"var(--green-bg)",border:"1.5px solid var(--green)",padding:"10px 14px",borderRadius:4,marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{fontSize:12,color:"var(--green)",fontWeight:700}}>✓ API Key configurada</span><button onClick={()=>{setApiKey("");sLS("wt_ak","");}} style={{background:"transparent",border:"none",fontSize:11,color:"var(--ink-muted)",cursor:"pointer",textDecoration:"underline"}}>Cambiar</button></div>}
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {[{l:"Nombre",k:"nombre",t:"text",pl:"Tu nombre"},{l:"Peso (kg)",k:"peso",t:"number",pl:"78"},{l:"Estatura (cm)",k:"estatura",t:"number",pl:"175"},{l:"Edad",k:"edad",t:"number",pl:"28"},{l:"Peso meta (kg)",k:"pesoMeta",t:"number",pl:"70"},{l:"Inicio del plan",k:"inicioPlan",t:"date"}].map(f=>(
              <div key={f.k}><label className="flabel">{f.l}</label><input type={f.t} placeholder={f.pl} value={tmpP[f.k]||""} onChange={e=>setTmpP(p=>({...p,[f.k]:e.target.value}))}/></div>
            ))}
            <div><label className="flabel">Sexo</label><select className="finput" value={tmpP.sexo} onChange={e=>setTmpP(p=>({...p,sexo:e.target.value}))}><option value="m">Masculino</option><option value="f">Femenino</option></select></div>
            <div><label className="flabel">Nivel de actividad</label><select className="finput" value={tmpP.actividad} onChange={e=>setTmpP(p=>({...p,actividad:e.target.value}))}><option value="sedentario">Sedentario</option><option value="poco">Poco activo</option><option value="moderado">Moderado</option><option value="muy">Muy activo</option></select></div>
            <div><label className="flabel">Objetivo</label><select className="finput" value={tmpP.objetivo} onChange={e=>setTmpP(p=>({...p,objetivo:e.target.value}))}><option value="bajar">Bajar de peso</option><option value="mantener">Mantener</option><option value="musculo">Ganar músculo</option><option value="rendimiento">Rendimiento</option></select></div>
            <div><label className="flabel">Días gym/semana: {tmpP.diasGym}</label><input type="range" min={1} max={7} value={tmpP.diasGym} onChange={e=>setTmpP(p=>({...p,diasGym:+e.target.value}))} style={{width:"100%",accentColor:"var(--blue)",marginTop:6}}/></div>
            <div>
              <label className="flabel">Velocidad del objetivo</label>
              <div className="speed-grid">
                {SP.map(s=><button key={s.id} className={`speed-btn ${tmpP.velocidad===s.id?"sel":""}`} onClick={()=>setTmpP(p=>({...p,velocidad:s.id}))}>{s.label}</button>)}
              </div>
            </div>
            {metas&&<div style={{background:"var(--blue-bg)",border:"1.5px solid var(--blue)",padding:"12px 14px",borderRadius:4}}><p className="sec-label" style={{color:"var(--blue)",marginBottom:8}}>Metas calculadas</p><div style={{display:"flex",gap:16,flexWrap:"wrap"}}>{[["Meta",`${metas.calorias} kcal`],["P",`${metas.proteinas}g`],["C",`${metas.carbos}g`],["G",`${metas.grasas}g`]].map(([l,v])=><div key={l}><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:900}}>{v}</div><div style={{fontSize:9,fontWeight:700,letterSpacing:"1.5px",textTransform:"uppercase",color:"var(--blue)"}}>{l}</div></div>)}</div></div>}
            <button className="btn green" onClick={()=>{setPerfil({...tmpP});alert("✓ Perfil guardado");}}>Guardar perfil</button>
          </div>
        </div>
      )}

      {/* BOTTOM NAV */}
      <div className="bottom-nav">
        {[
          {id:"cal",icon:"📅",label:"Inicio"},
          {id:"peso",icon:"⚖️",label:"Peso"},
          {id:"rec",icon:"🍽",label:"Recetas"},
          {id:"plan",icon:"🤖",label:"Plan"},
          {id:"hab",icon:"📊",label:"Hábitos"},
          {id:"perfil",icon:"⚙️",label:"Perfil"},
        ].map(n=>(
          <button key={n.id} className={`nav-item ${view===n.id?"active":""}`} onClick={()=>setView(n.id)}>
            <span className="ni-icon">{n.icon}</span>
            <span className="ni-label">{n.label}</span>
          </button>
        ))}
      </div>

      {/* MEAL MODAL */}
      {modal?.type==="meal"&&(
        <div className="modal-bg" onClick={()=>setModal(null)}>
          <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
            <div className="modal-handle"/>
            <div className="modal-title">{MI[modal.meal]} {ML[modal.meal]}</div>
            <div className="modal-sub">{modal.date.toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"long"})}</div>
            {gd(modal.date).recetas?.[modal.meal]&&<div style={{background:"#F9F0FF",border:"1.5px solid var(--purple)",padding:"10px 14px",borderRadius:3,marginBottom:12}}><p style={{fontSize:12,fontWeight:700,color:"var(--purple)"}}>🍽 Receta IA: {gd(modal.date).recetas[modal.meal].nombre}</p></div>}
            <textarea rows={3} placeholder='Ej: "2 huevos revueltos, tostada, café"' value={tempTxt} onChange={e=>setTempTxt(e.target.value)} autoFocus style={{marginBottom:12}}/>
            <button onClick={()=>setManEdit(m=>!m)} style={{background:manEdit?"var(--ink)":"transparent",color:manEdit?"var(--bone)":"var(--ink-muted)",border:"1.5px solid var(--line)",padding:"10px 14px",fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,fontWeight:800,letterSpacing:"1.5px",textTransform:"uppercase",cursor:"pointer",borderRadius:3,width:"100%",marginBottom:12}}>✎ {manEdit?"Editando macros manual":"Editar macros manual"}</button>
            {manEdit&&(
              <div style={{border:"1.5px solid var(--ink)",padding:12,borderRadius:3,background:"var(--bone-dark)",marginBottom:12}}>
                <p style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:10,fontWeight:800,letterSpacing:"2px",textTransform:"uppercase",color:"var(--blue)",marginBottom:10}}>Macros manuales</p>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  {[{k:"calorias",l:"Kcal"},{k:"proteinas",l:"Prot g"},{k:"carbos",l:"Carbs g"},{k:"grasas",l:"Grasas g"}].map(f=>(
                    <div key={f.k}><label className="flabel">{f.l}</label><input type="number" min={0} value={manVals[f.k]} onChange={e=>setManVals(v=>({...v,[f.k]:e.target.value}))} style={{textAlign:"center",fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:900}}/></div>
                  ))}
                </div>
              </div>
            )}
            {/* Foto */}
            <div style={{marginBottom:12}}>
              <label className="flabel">📷 Foto (opcional, la IA analiza)</label>
              <div style={{border:"1.5px dashed var(--ink-muted)",borderRadius:3,padding:"16px",background:"var(--bone-dark)",textAlign:"center",cursor:"pointer"}} onClick={()=>document.getElementById("mi-input").click()}>
                <input id="mi-input" type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>setMealImg(ev.target.result);r.readAsDataURL(f);}}}/>
                {mealImg?(<div style={{position:"relative",display:"inline-block"}}><img src={mealImg} alt="platillo" style={{maxHeight:120,maxWidth:"100%",borderRadius:3}}/><button onClick={e=>{e.stopPropagation();setMealImg(null);}} style={{position:"absolute",top:-8,right:-8,background:"var(--red)",color:"white",border:"none",borderRadius:"50%",width:24,height:24,fontSize:14,cursor:"pointer",fontWeight:900}}>×</button></div>)
                :(<div><div style={{fontSize:32,marginBottom:6}}>📷</div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,fontWeight:800,letterSpacing:"1.5px",textTransform:"uppercase",color:"var(--ink-muted)"}}>Toca para tomar foto</div></div>)}
              </div>
            </div>
            {!manEdit&&<div className="tip"><p>{!apiKey?"⚠️ Configura tu API Key para estimación automática de macros.":"🤖 La IA estimará los macros automáticamente."}</p></div>}
            <div className="btn-row" style={{marginTop:16}}>
              <button className="btn green" onClick={saveMeal}>{manEdit?"Guardar":mealImg?"Guardar + Analizar foto":"Guardar + IA"}</button>
              <button className="btn sec" onClick={()=>{setModal(null);setMealImg(null);}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
